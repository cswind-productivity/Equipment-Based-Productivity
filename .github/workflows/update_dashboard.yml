name: Dashboard Auto Update

on:
  push:
    paths:
      - 'Raw Data_Global Equipment-Based Productivity.xlsx'
      - 'dashboard_template.html'
      - 'scripts/convert_excel.py'
      - '.github/workflows/update_dashboard.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Convert Excel to dashboard
        run: |
          python scripts/convert_excel.py

      - name: Commit and push generated dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto update dashboard - $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
