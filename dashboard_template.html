<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS WIND Global Equipment-Based Productivity Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    background:#eef2f7;
    margin:0;
    padding:20px;
}

.dashboard {
    max-width:1200px;
    margin:auto;
}

.header {
    background:linear-gradient(135deg,#163a70,#2d5cff);
    color:white;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.header h1 {
    margin:0;
    font-size:24px;
}

.controls {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-top:16px;
}

.control-group {
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:12px;
    padding:10px;
}

.control-group label {
    display:block;
    font-size:12px;
    margin-bottom:6px;
}

.control-group select {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
}

.summary {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:20px;
}

</html>
