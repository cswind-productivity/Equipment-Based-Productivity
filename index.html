<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS WIND Global Equipment-Based Productivity Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --navy:#1f4e78;
  --navy2:#315d84;
  --bg:#eef2f6;
  --line:#d7e0ea;
  --card:#ffffff;
  --text:#111827;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,'Malgun Gothic',sans-serif;
}
.wrap{
  max-width:1480px;
  margin:0 auto;
  background:#fff;
  min-height:100vh;
}
.header{
  background:var(--navy);
  color:#fff;
  padding:28px 28px;
  text-align:center;
}
.header h1{
  margin:0;
  font-size:28px;
  letter-spacing:.5px;
  font-weight:800;
}
.controls{
  display:flex;
  gap:14px;
  align-items:center;
  padding:16px 24px;
  border-bottom:1px solid var(--line);
  background:#f8fafc;
  flex-wrap:wrap;
}
.controls label{
  font-weight:700;
  font-size:13px;
}
.btn-group{
  display:inline-flex;
  border:1px solid #b9c7d6;
  border-radius:4px;
  overflow:hidden;
  background:#fff;
}
.btn-group button{
  min-width:72px;
  padding:8px 16px;
  border:0;
  background:#fff;
  cursor:pointer;
  font-weight:700;
}
.btn-group button.active{
  background:var(--navy);
  color:#fff;
}
select{
  min-width:96px;
  padding:8px 12px;
  border:1px solid #b9c7d6;
  border-radius:4px;
  background:#fff;
  font-weight:700;
}
.content{
  padding:18px 24px 40px;
}
.section-title{
  background:var(--navy);
  color:#fff;
  padding:12px 16px;
  border-radius:5px;
  font-weight:800;
  margin:12px 0 16px;
  font-size:17px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:22px;
  font-size:12px;
  background:#fff;
}
th{
  background:var(--navy2);
  color:#fff;
  padding:10px 8px;
  border:1px solid #d9e2ec;
  text-align:center;
}
td{
  padding:8px;
  border:1px solid #d9e2ec;
  text-align:center;
}
td:first-child,th:first-child{
  text-align:left;
  font-weight:700;
}
tfoot td{
  background:#fff1b8;
  font-weight:800;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-bottom:28px;
}
.chart-card{
  background:var(--card);
  border:1px solid #cfd9e5;
  border-radius:7px;
  padding:12px 14px;
  min-height:280px;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.chart-title{
  text-align:center;
  font-weight:800;
  margin:4px 0 0;
  font-size:13px;
}
.chart-unit{
  text-align:right;
  font-size:10px;
  color:#475569;
  margin-bottom:4px;
}
.chart-card canvas{
  width:100%!important;
  height:220px!important;
}
.trend-title{
  background:var(--navy);
  color:#fff;
  padding:10px 14px;
  border-radius:5px;
  font-weight:800;
  margin-top:18px;
}
.factory-box{
  border:1px solid #cfd9e5;
  background:#f8fafc;
  border-radius:7px;
  padding:12px;
  margin:12px 0 18px;
}
.factory-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(160px,1fr));
  gap:8px;
}
.factory-grid label{
  border:1px solid #89a7c5;
  border-radius:4px;
  padding:5px 8px;
  font-size:12px;
  background:#fff;
  font-weight:700;
}
.small-note{
  color:#64748b;
  font-size:11px;
  margin-top:6px;
}
@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
  .factory-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>CS WIND Global Equipment-Based Productivity Dashboard</h1>
  </div>

  <div class="controls">
    <label>View:</label>
    <div class="btn-group">
      <button id="weeklyBtn" onclick="setView('weekly')">Weekly</button>
      <button id="monthlyBtn" onclick="setView('monthly')">Monthly</button>
    </div>
    <label>Year:</label>
    <select id="yearSelect" onchange="onYearChange()"></select>
    <label id="periodLabel">Week:</label>
    <select id="periodSelect" onchange="renderAll()"></select>
  </div>

  <div class="content">
    <div class="section-title">1. 공장별 장비 현황 (Equipment Inventory)</div>
    <div id="machineTable"></div>

    <div class="section-title">2. 공장별 생산 실적 (Production Performance)</div>
    <div id="performanceTable"></div>

    <div class="section-title">3. 장비당 생산 효율성 (Production per Equipment)</div>
    <div class="grid" id="barCharts"></div>

    <div class="trend-title">Trend of Equipment-Based Productivity (최근 10주)</div>
    <div class="factory-box">
      <b>공장 선택 (Factory Selection)</b>
      <div class="factory-grid" id="factoryChecks"></div>
      <div class="small-note">체크한 공장만 하단 Trend 라인그래프에 표시됩니다.</div>
    </div>
    <div class="grid" id="trendCharts"></div>
  </div>
</div>

  {key:'bending',title:'Bending / Machine',unit:'Can / Machine',num:'bending',den:'bending'},
  {key:'lw',title:'L/W / Machine',unit:'Can / Machine',num:'lw',den:'lw'},
  {key:'cw',title:'C/W / Machine',unit:'CS Joint / Machine',num:'cw',den:'cw'},
  {key:'btgt',title:'BT GT / Growing Line',unit:'BT Sec / Line',num:'btgt',den:'growing'},
  {key:'wtbooth',title:'WT GT / Paint Booth',unit:'WT Sec / Booth',num:'wtgt',den:'paintBooth'},
  {key:'wtline',title:'WT GT / Paint Line',unit:'WT Sec / Line',num:'wtgt',den:'paintLine'}
];

const equipmentCols=[
  ['bending','Roll Bending Machine'],
  ['lw','L/W Machine'],
  ['cw','C/W Machine'],
  ['growing','Growing Line'],
  ['paintBooth','Paint Booth'],
  ['paintLine','Paint Line']
];

const productionCols=[
  ['bending','Bending'],
  ['lw','L/W'],
  ['cw','C/W'],
  ['btgt','BT GT'],
  ['wtgt','WT GT']
];

const palette=['#2563eb','#38bdf8','#0f766e','#dc2626','#f97316','#8b5cf6','#0891b2','#64748b','#111827','#84cc16'];

function fmt(n,d=2){
  const v=Number(n||0);
  return v.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
}

function valueFor(factory,metric,data){
  const p=data.production[factory]||{};
  const e=data.equipment[factory]||{};
  const den=Number(e[metric.den]||0);
  return den ? Number(p[metric.num]||0)/den : 0;
}

function getFactories(data){
  return Object.keys(data.equipment||{});
}

function getData(){
  const y=document.getElementById('yearSelect').value;
  const p=document.getElementById('periodSelect').value;
  const src=currentView==='weekly'?rawData:monthlyData;
  return (src[y]&&src[y][p])?src[y][p]:null;
}

function destroyCharts(){
  chartObjects.forEach(c=>c.destroy());
  chartObjects=[];
}

function makeChart(canvas,config){
  const c=new Chart(canvas,config);
  chartObjects.push(c);
  return c;
}

function setView(view){
  currentView=view;
  document.getElementById('weeklyBtn').classList.toggle('active',view==='weekly');
  document.getElementById('monthlyBtn').classList.toggle('active',view==='monthly');
  document.getElementById('periodLabel').textContent=view==='weekly'?'Week:':'Month:';
  populatePeriods();
  renderAll();
}

function populateYears(){
  const years=Object.keys(rawData||{}).sort();
  const sel=document.getElementById('yearSelect');
  sel.innerHTML='';
  years.forEach(y=>{
    const o=document.createElement('option');
    o.value=y;
    o.textContent=y;
    sel.appendChild(o);
  });
  if(years.length){sel.value=years[years.length-1];}
}

function findLastNonZeroPeriod(src,year){
  const periods=Object.keys(src[year]||{});
  let last=periods[periods.length-1]||'';
  for(let i=periods.length-1;i>=0;i--){
    const d=src[year][periods[i]];
    const total=Object.values(d.production||{}).reduce((s,row)=>s+Object.values(row).reduce((a,b)=>a+Number(b||0),0),0);
    if(total>0){return periods[i];}
  }
  return last;
}

function populatePeriods(){
  const y=document.getElementById('yearSelect').value;
  const src=currentView==='weekly'?rawData:monthlyData;
  const periods=Object.keys((src&&src[y])?src[y]:{});
  const sel=document.getElementById('periodSelect');
  sel.innerHTML='';
  periods.forEach(p=>{
    const o=document.createElement('option');
    o.value=p;
    o.textContent=p;
    sel.appendChild(o);
  });
  const last=findLastNonZeroPeriod(src,y);
  if(last){sel.value=last;}
}

function onYearChange(){
  populatePeriods();
  renderAll();
}

function buildTable(cols,rows,total){
  let html='<table><thead><tr>';
  cols.forEach(c=>html+='<th>'+c+'</th>');
  html+='</tr></thead><tbody>';
  rows.forEach(r=>{
    html+='<tr>';
    r.forEach(c=>html+='<td>'+c+'</td>');
    html+='</tr>';
  });
  html+='</tbody>';
  if(total&&rows.length){
    html+='<tfoot><tr><td>CS Total</td>';
    for(let i=1;i<cols.length-1;i++){
      let s=0;
      rows.forEach(r=>s+=Number(String(r[i]).replace(/,/g,''))||0);
      html+='<td>'+fmt(s,2)+'</td>';
    }
    html+='<td></td></tr></tfoot>';
  }
  html+='</table>';
  return html;
}

function renderTables(data){
  const factories=getFactories(data);
  const machineRows=factories.map(f=>[f].concat(equipmentCols.map(([k])=>fmt((data.equipment[f]||{})[k],2))).concat(['']));
  const machineHeaders=['Factory'].concat(equipmentCols.map(x=>x[1])).concat(['Remark']);
  document.getElementById('machineTable').innerHTML=buildTable(machineHeaders,machineRows,true);

  const prodRows=factories.map(f=>[f].concat(productionCols.map(([k])=>fmt((data.production[f]||{})[k],2))).concat(['']));
  const prodHeaders=['Factory'].concat(productionCols.map(x=>x[1])).concat(['Remark']);
  document.getElementById('performanceTable').innerHTML=buildTable(prodHeaders,prodRows,false);
}

function renderBarCharts(data){
  const box=document.getElementById('barCharts');
  box.innerHTML='';
  const factories=getFactories(data);

  metricDefs.forEach((m)=>{
    const card=document.createElement('div');
    card.className='chart-card';
    card.innerHTML='<div class="chart-title">'+m.title+'</div><div class="chart-unit">('+m.unit+')</div><canvas></canvas>';
    box.appendChild(card);

    const vals=factories.map(f=>Number(valueFor(f,m,data).toFixed(2)));
    const nonzero=vals.filter(v=>v>0);
    const cs=nonzero.length?Number((nonzero.reduce((a,b)=>a+b,0)/nonzero.length).toFixed(2)):0;
    const labels=factories.concat(['CS Total']);
    const allVals=vals.concat([cs]);

    makeChart(card.querySelector('canvas'),{
      type:'bar',
      data:{labels:labels,datasets:[{data:allVals,backgroundColor:labels.map((_,i)=>palette[i%palette.length]),borderWidth:0}]},
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,grid:{color:'#e5e7eb'}},x:{grid:{display:false},ticks:{font:{size:10}}}}
      }
    });
  });
}

function renderFactoryChecks(){
  const data=getData();
  if(!data){return;}
  const factories=getFactories(data).concat(['CS Total']);
  const box=document.getElementById('factoryChecks');
  if(box.children.length){return;}
  factories.forEach(f=>{
    const label=document.createElement('label');
    label.innerHTML='<input type="checkbox" value="'+f+'" checked onchange="renderTrendCharts()"> '+f;
    box.appendChild(label);
  });
}

function selectedFactories(){
  return Array.from(document.querySelectorAll('#factoryChecks input:checked')).map(i=>i.value);
}

function recentWeeks(){
  const y=document.getElementById('yearSelect').value;
  const weeks=Object.keys(rawData[y]||{});
  const cur=document.getElementById('periodSelect').value;
  let idx=weeks.indexOf(cur);
  if(idx<0){idx=weeks.length-1;}
  return weeks.slice(Math.max(0,idx-9),idx+1);
}

function renderTrendCharts(){
  const box=document.getElementById('trendCharts');
  box.innerHTML='';
  const y=document.getElementById('yearSelect').value;
  const weeks=recentWeeks();
  const selected=selectedFactories();

  metricDefs.forEach((m)=>{
    const card=document.createElement('div');
    card.className='chart-card';
    card.innerHTML='<div class="chart-title">'+m.title+'</div><div class="chart-unit">('+m.unit+')</div><canvas></canvas>';
    box.appendChild(card);

    const datasets=selected.map((f,i)=>{
      const values=weeks.map(w=>{
        const d=rawData[y]&&rawData[y][w]?rawData[y][w]:null;
        if(!d){return 0;}
        if(f==='CS Total'){
          const facs=getFactories(d);
          const vals=facs.map(ff=>valueFor(ff,m,d)).filter(v=>v>0);
          return vals.length?Number((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2)):0;
        }
        return Number(valueFor(f,m,d).toFixed(2));
      });
      return {label:f,data:values,borderColor:palette[i%palette.length],backgroundColor:palette[i%palette.length],tension:.25,pointRadius:2,fill:false};
    });

    makeChart(card.querySelector('canvas'),{
      type:'line',
      data:{labels:weeks,datasets:datasets},
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:10,font:{size:10}}}},
        scales:{y:{beginAtZero:true,grid:{color:'#e5e7eb'}},x:{grid:{display:false},ticks:{font:{size:10}}}}
      }
    });
  });
}

function renderAll(){
  destroyCharts();
  const data=getData();
  if(!data){
    document.getElementById('machineTable').innerHTML='<p>No data.</p>';
    document.getElementById('performanceTable').innerHTML='<p>No data.</p>';
    document.getElementById('barCharts').innerHTML='';
    document.getElementById('trendCharts').innerHTML='';
    return;
  }
  renderTables(data);
  renderBarCharts(data);
  renderFactoryChecks();
  renderTrendCharts();
}

populateYears();
setView('weekly');
</script>
</body>
</html>
