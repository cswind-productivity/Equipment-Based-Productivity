<script>

let currentViewMode = 'weekly';

const monthWeekMap = {
    '2026-Jan': ['WK01', 'WK02', 'WK03', 'WK04'],
    '2026-Feb': ['WK05', 'WK06', 'WK07', 'WK08'],
    '2026-Mar': ['WK09', 'WK10', 'WK11', 'WK12', 'WK13'],
    '2026-Apr': ['WK14', 'WK15', 'WK16', 'WK17'],
    '2026-May': ['WK18', 'WK19', 'WK20', 'WK21'],
    '2026-Jun': ['WK22', 'WK23', 'WK24', 'WK25', 'WK26'],
    '2026-Jul': ['WK27', 'WK28', 'WK29', 'WK30'],
    '2026-Aug': ['WK31', 'WK32', 'WK33', 'WK34'],
    '2026-Sep': ['WK35', 'WK36', 'WK37', 'WK38', 'WK39'],
    '2026-Oct': ['WK40', 'WK41', 'WK42', 'WK43'],
    '2026-Nov': ['WK44', 'WK45', 'WK46', 'WK47'],
    '2026-Dec': ['WK48', 'WK49', 'WK50', 'WK51', 'WK52', 'WK53']
};

function getMonthlyData(year, monthKey) {

    const weeks = monthWeekMap[monthKey] || [];
    const validWeeks = weeks.filter(wk => rawData[year]?.[wk]);

    if (validWeeks.length === 0) return null;

    const result = {
        equipment: {},
        production: {}
    };

    factories.forEach(factory => {

        result.equipment[factory] = {
            bending: 0,
            lw: 0,
            cw: 0,
            growing: 0,
            paintBooth: 0,
            paintLine: 0
        };

        result.production[factory] = {
            bending: 0,
            lw: 0,
            cw: 0,
            btgt: 0,
            wtgt: 0
        };

        validWeeks.forEach(wk => {

            const weekData = rawData[year][wk];

            const equip = weekData.equipment[factory];
            const prod = weekData.production[factory];

            Object.keys(result.equipment[factory]).forEach(key => {
                result.equipment[factory][key] += equip[key] || 0;
            });

            Object.keys(result.production[factory]).forEach(key => {
                result.production[factory][key] += prod[key] || 0;
            });

        });

        Object.keys(result.equipment[factory]).forEach(key => {
            result.equipment[factory][key] =
                result.equipment[factory][key] / validWeeks.length;
        });

        Object.keys(result.production[factory]).forEach(key => {
            result.production[factory][key] =
                result.production[factory][key] / validWeeks.length;
        });

    });

    return result;
}

function getPeriodData(year, period) {

    if (currentViewMode === 'monthly') {
        return getMonthlyData(year, period);
    }

    return rawData[year]?.[period];
}

function updateWeekSelector(year) {

    const weekSelect = document.getElementById('weekSelect');
    const periodLabel = document.getElementById('periodLabel');

    weekSelect.innerHTML = '';

    if (currentViewMode === 'monthly') {

        periodLabel.textContent = 'Month:';

        Object.keys(monthWeekMap).forEach(month => {

            if (month.startsWith(year.replace('Y', ''))) {

                const option = document.createElement('option');
                option.value = month;
                option.textContent = month;

                weekSelect.appendChild(option);
            }
        });

    } else {

        periodLabel.textContent = 'Week:';

        const weeks = getSortedWeeks(year);

        weeks.forEach(week => {

            const option = document.createElement('option');

            option.value = week;
            option.textContent = week;

            weekSelect.appendChild(option);
        });
    }
}

function initSelectors() {

    const yearSelect = document.getElementById('yearSelect');
    const weekSelect = document.getElementById('weekSelect');

    const weeklyBtn = document.getElementById('weeklyBtn');
    const monthlyBtn = document.getElementById('monthlyBtn');

    const years = Object.keys(rawData)
        .sort((a, b) => b.localeCompare(a));

    yearSelect.innerHTML = '';

    years.forEach(year => {

        const option = document.createElement('option');

        option.value = year;
        option.textContent = year;

        yearSelect.appendChild(option);
    });

    const currentYear = years[0];

    yearSelect.value = currentYear;

    updateWeekSelector(currentYear);

    if (currentViewMode === 'monthly') {

        weekSelect.value =
            `${currentYear.replace('Y', '')}-Jan`;

    } else {

        weekSelect.value =
            getLatestWeekWithData(currentYear);
    }

    weeklyBtn.addEventListener('click', () => {

        currentViewMode = 'weekly';

        weeklyBtn.classList.add('active');
        monthlyBtn.classList.remove('active');

        updateWeekSelector(yearSelect.value);

        weekSelect.value =
            getLatestWeekWithData(yearSelect.value);

        updateDashboard();
    });

    monthlyBtn.addEventListener('click', () => {

        currentViewMode = 'monthly';

        monthlyBtn.classList.add('active');
        weeklyBtn.classList.remove('active');

        updateWeekSelector(yearSelect.value);

        weekSelect.value =
            `${yearSelect.value.replace('Y', '')}-Jan`;

        updateDashboard();
    });

    yearSelect.addEventListener('change', () => {

        updateWeekSelector(yearSelect.value);

        if (currentViewMode === 'monthly') {

            weekSelect.value =
                `${yearSelect.value.replace('Y', '')}-Jan`;

        } else {

            weekSelect.value =
                getLatestWeekWithData(yearSelect.value);
        }

        updateDashboard();
    });

    weekSelect.addEventListener('change', updateDashboard);
}
